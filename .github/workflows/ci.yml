name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system font dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig fonts-noto-cjk

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run offline eval harness
        run: formulaai-eval --cases-dir evals/cases --runtime-dir runtime --eval-dir runtime/evals

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formulaai-eval-results
          path: runtime/evals
          if-no-files-found: warn
